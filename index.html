<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Editor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #0f0f1a; }
      ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
      ::selection { background: rgba(79, 195, 247, 0.3); }

      /* Geometric placeholder animation (shown when no audio is loaded) */
      @keyframes geoWave {
        0%, 100% { transform: scale(0.5) rotate(0deg); opacity: 0.04; }
        50% { transform: scale(1.0) rotate(45deg); opacity: 0.3; }
      }
      @keyframes geoSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes geoBreath {
        0%, 100% { transform: scale(0.85); opacity: 0.05; }
        50% { transform: scale(1.15); opacity: 0.25; }
      }
      @keyframes placeholderFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      #waveform-placeholder {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        opacity: 1;
        transition: opacity 0.5s ease;
        animation: placeholderFadeIn 0.8s ease;
        overflow: hidden;
      }
      #waveform-placeholder.hidden {
        opacity: 0;
      }
      #waveform-placeholder .geo-grid {
        display: grid;
        gap: 2px;
        align-items: center;
        justify-items: center;
        width: 100%;
        height: 100%;
        padding: 4px;
      }
      #waveform-placeholder .geo-tile {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #waveform-placeholder .geo-tile svg {
        animation: geoWave 3s ease-in-out infinite;
      }
      #waveform-placeholder .wave-label {
        position: absolute;
        bottom: 16px;
        left: 0; right: 0;
        color: #5a5a7a;
        font-size: 13px;
        text-align: center;
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        letter-spacing: 1px;
        opacity: 0.7;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-wGz6QD6f.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var TILE_SIZE = 72;
        var POLL_INTERVAL = 200;
        var POLL_TIMEOUT = 10000;

        // Color palette inspired by Islamic geometric art
        var COLORS = ['#4fc3f7', '#80deea', '#4dd0e1', '#26c6da', '#00bcd4',
                      '#b2ebf2', '#4fc3f7', '#29b6f6', '#03a9f4', '#0288d1'];

        function findWaveformCanvas() {
          var canvases = document.querySelectorAll('canvas');
          for (var i = 0; i < canvases.length; i++) {
            var c = canvases[i];
            var parent = c.parentElement;
            if (parent && getComputedStyle(parent).backgroundColor === 'rgb(10, 10, 24)') {
              return c;
            }
          }
          return null;
        }

        // 8-pointed star (Rub el Hizb) — classic Islamic motif
        function createStar8(size, color) {
          var s = size;
          var ns = 'http://www.w3.org/2000/svg';
          var svg = document.createElementNS(ns, 'svg');
          svg.setAttribute('width', s);
          svg.setAttribute('height', s);
          svg.setAttribute('viewBox', '0 0 100 100');

          // Two overlapping squares rotated 45 degrees to form 8-pointed star
          var sq1 = document.createElementNS(ns, 'rect');
          sq1.setAttribute('x', '22'); sq1.setAttribute('y', '22');
          sq1.setAttribute('width', '56'); sq1.setAttribute('height', '56');
          sq1.setAttribute('fill', 'none');
          sq1.setAttribute('stroke', color); sq1.setAttribute('stroke-width', '1.5');
          sq1.setAttribute('transform', 'rotate(45 50 50)');

          var sq2 = document.createElementNS(ns, 'rect');
          sq2.setAttribute('x', '22'); sq2.setAttribute('y', '22');
          sq2.setAttribute('width', '56'); sq2.setAttribute('height', '56');
          sq2.setAttribute('fill', 'none');
          sq2.setAttribute('stroke', color); sq2.setAttribute('stroke-width', '1.5');

          // Inner octagon
          var oct = document.createElementNS(ns, 'polygon');
          var r = 22, cx = 50, cy = 50;
          var pts = [];
          for (var k = 0; k < 8; k++) {
            var angle = (k * 45 - 90) * Math.PI / 180;
            pts.push((cx + r * Math.cos(angle)).toFixed(1) + ',' + (cy + r * Math.sin(angle)).toFixed(1));
          }
          oct.setAttribute('points', pts.join(' '));
          oct.setAttribute('fill', 'none');
          oct.setAttribute('stroke', color); oct.setAttribute('stroke-width', '1');

          // Center dot
          var dot = document.createElementNS(ns, 'circle');
          dot.setAttribute('cx', '50'); dot.setAttribute('cy', '50');
          dot.setAttribute('r', '3');
          dot.setAttribute('fill', color); dot.setAttribute('opacity', '0.6');

          svg.appendChild(sq1);
          svg.appendChild(sq2);
          svg.appendChild(oct);
          svg.appendChild(dot);
          return svg;
        }

        // Hexagonal rosette
        function createHexRosette(size, color) {
          var ns = 'http://www.w3.org/2000/svg';
          var svg = document.createElementNS(ns, 'svg');
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          svg.setAttribute('viewBox', '0 0 100 100');

          // Outer hexagon
          var hex = document.createElementNS(ns, 'polygon');
          var pts = [];
          for (var k = 0; k < 6; k++) {
            var a = (k * 60 - 30) * Math.PI / 180;
            pts.push((50 + 38 * Math.cos(a)).toFixed(1) + ',' + (50 + 38 * Math.sin(a)).toFixed(1));
          }
          hex.setAttribute('points', pts.join(' '));
          hex.setAttribute('fill', 'none');
          hex.setAttribute('stroke', color); hex.setAttribute('stroke-width', '1.5');

          // Inner star lines — 6 triangles radiating from center
          var g = document.createElementNS(ns, 'g');
          for (var k = 0; k < 6; k++) {
            var a1 = (k * 60 - 30) * Math.PI / 180;
            var a2 = ((k + 1) * 60 - 30) * Math.PI / 180;
            var line = document.createElementNS(ns, 'polygon');
            var x1 = 50 + 38 * Math.cos(a1), y1 = 50 + 38 * Math.sin(a1);
            var x2 = 50 + 38 * Math.cos(a2), y2 = 50 + 38 * Math.sin(a2);
            line.setAttribute('points',
              '50,50 ' + x1.toFixed(1) + ',' + y1.toFixed(1) + ' ' + x2.toFixed(1) + ',' + y2.toFixed(1));
            line.setAttribute('fill', 'none');
            line.setAttribute('stroke', color); line.setAttribute('stroke-width', '0.8');
            g.appendChild(line);
          }

          // Inner hexagon
          var hex2 = document.createElementNS(ns, 'polygon');
          var pts2 = [];
          for (var k = 0; k < 6; k++) {
            var a = (k * 60) * Math.PI / 180;
            pts2.push((50 + 16 * Math.cos(a)).toFixed(1) + ',' + (50 + 16 * Math.sin(a)).toFixed(1));
          }
          hex2.setAttribute('points', pts2.join(' '));
          hex2.setAttribute('fill', 'none');
          hex2.setAttribute('stroke', color); hex2.setAttribute('stroke-width', '1');

          svg.appendChild(hex);
          svg.appendChild(g);
          svg.appendChild(hex2);
          return svg;
        }

        // Diamond lattice tile
        function createDiamond(size, color) {
          var ns = 'http://www.w3.org/2000/svg';
          var svg = document.createElementNS(ns, 'svg');
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          svg.setAttribute('viewBox', '0 0 100 100');

          // Diamond shape
          var d = document.createElementNS(ns, 'polygon');
          d.setAttribute('points', '50,8 92,50 50,92 8,50');
          d.setAttribute('fill', 'none');
          d.setAttribute('stroke', color); d.setAttribute('stroke-width', '1.5');

          // Inner cross
          var l1 = document.createElementNS(ns, 'line');
          l1.setAttribute('x1', '50'); l1.setAttribute('y1', '20');
          l1.setAttribute('x2', '50'); l1.setAttribute('y2', '80');
          l1.setAttribute('stroke', color); l1.setAttribute('stroke-width', '0.8');
          var l2 = document.createElementNS(ns, 'line');
          l2.setAttribute('x1', '20'); l2.setAttribute('y1', '50');
          l2.setAttribute('x2', '80'); l2.setAttribute('y2', '50');
          l2.setAttribute('stroke', color); l2.setAttribute('stroke-width', '0.8');

          // Inner diamond
          var d2 = document.createElementNS(ns, 'polygon');
          d2.setAttribute('points', '50,30 70,50 50,70 30,50');
          d2.setAttribute('fill', 'none');
          d2.setAttribute('stroke', color); d2.setAttribute('stroke-width', '1');

          svg.appendChild(d);
          svg.appendChild(l1);
          svg.appendChild(l2);
          svg.appendChild(d2);
          return svg;
        }

        var shapeCreators = [createStar8, createHexRosette, createDiamond];

        function createPlaceholder(cols, rows) {
          var el = document.createElement('div');
          el.id = 'waveform-placeholder';

          var grid = document.createElement('div');
          grid.className = 'geo-grid';
          // Will be sized dynamically in initPlaceholder
          grid.style.gridTemplateColumns = 'repeat(auto-fill, ' + TILE_SIZE + 'px)';
          grid.style.gridTemplateRows = 'repeat(auto-fill, ' + TILE_SIZE + 'px)';

          for (var row = 0; row < rows; row++) {
            for (var col = 0; col < cols; col++) {
              var tile = document.createElement('div');
              tile.className = 'geo-tile';

              // Pick shape based on position (checkerboard-like pattern)
              var shapeIdx = (row + col) % 3;
              var color = COLORS[(row * cols + col) % COLORS.length];
              var svg = shapeCreators[shapeIdx](TILE_SIZE - 4, color);

              // Wave animation delay based on distance from left
              // Creates a wave that sweeps left to right
              var dist = col * 0.15 + row * 0.08;
              svg.style.animationDelay = dist.toFixed(2) + 's';

              tile.appendChild(svg);
              grid.appendChild(tile);
            }
          }
          el.appendChild(grid);

          var label = document.createElement('div');
          label.className = 'wave-label';
          label.textContent = '\u97F3\u58F0\u30D5\u30A1\u30A4\u30EB\u3092\u30C9\u30E9\u30C3\u30B0\uFF06\u30C9\u30ED\u30C3\u30D7\u3001\u307E\u305F\u306F\u30D5\u30A1\u30A4\u30EB\u3092\u958B\u304F';
          el.appendChild(label);

          return el;
        }

        function initPlaceholder() {
          var canvas = findWaveformCanvas();
          if (!canvas) return false;

          var container = canvas.parentElement;
          if (!container) return false;

          if (getComputedStyle(container).position === 'static') {
            container.style.position = 'relative';
          }

          // Calculate grid dimensions to fill the container
          var rect = container.getBoundingClientRect();
          var cols = Math.max(1, Math.ceil(rect.width / (TILE_SIZE + 2)));
          var rows = Math.max(1, Math.ceil(rect.height / (TILE_SIZE + 2)));

          var placeholder = createPlaceholder(cols, rows);
          container.appendChild(placeholder);

          function updateVisibility() {
            if (canvas.style.cursor === 'crosshair') {
              placeholder.classList.add('hidden');
            } else {
              placeholder.classList.remove('hidden');
            }
          }
          updateVisibility();

          var styleObserver = new MutationObserver(updateVisibility);
          styleObserver.observe(canvas, { attributes: true, attributeFilter: ['style'] });

          var childObserver = new MutationObserver(function () {
            if (!container.contains(canvas)) {
              styleObserver.disconnect();
              var newCanvas = findWaveformCanvas();
              if (newCanvas) {
                canvas = newCanvas;
                updateVisibility();
                styleObserver.observe(canvas, { attributes: true, attributeFilter: ['style'] });
              }
            }
          });
          childObserver.observe(container, { childList: true });

          return true;
        }

        var elapsed = 0;
        var poll = setInterval(function () {
          if (initPlaceholder() || elapsed >= POLL_TIMEOUT) {
            clearInterval(poll);
          }
          elapsed += POLL_INTERVAL;
        }, POLL_INTERVAL);
      })();
    </script>
  </body>
</html>
